<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intro SE331</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div class="nav-bar"></div>
            <div class="cart">Cart({{ cart}})</div>
        <div class="product-display">
            <div class="product-container">
                <div class="product-image">
                    <img :src="image" :class="{'out-of-stock-img': !inStock}">
                </div>
            </div>
        </div>
        <div class="product-info">
            <h1>
                {{ title }}
            </h1>
            <p v-if="onSale">On Sale</p>
            <p v-else>not on sale</p>
            <div>
                <button class="button" @click="toggleStock">Toggle Stock</button>
                <p v-if="inStock">In Stock</p>
                <p v-else>Out of Stock</p>
            </div>
            <p>{{description}}</p>
            <ul>
                <li v-for="detail in details">{{detail}}</li>
            </ul>
            <div v-for="(variant, index) in variants" :key="variant.id"
            @mouseover="updateVariant(index)" 
                class="color-circle" :style="{backgroundColor: variant.color}">

            </div>
                <button class="button" :disabled='!inStock' @click="addToCart"
                :class="{disabledButton: !inStock}">Add To Cart</button>
            <span v-for="size in sizes" :key="size">
                {{ size }}
            </span>
        </div>
    </div>

    <!-- Import Js -->
    <script src="./main.js"></script>
</body>

</html>
